<div class="flex items-center gap-3">
    <button k-on:click="toggle"
        class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2
            {{ $on ? 'bg-indigo-600' : 'bg-gray-300' }}">
        <span class="inline-block h-4 w-4 transform rounded-full bg-white shadow-sm transition-transform duration-200
            {{ $on ? 'translate-x-6' : 'translate-x-1' }}"></span>
    </button>
    <span class="text-sm text-gray-700 font-medium">{{ $label }}</span>
    <span class="text-xs text-gray-400" k-text="on">{{ $on ? 'ON' : 'OFF' }}</span>
</div>
