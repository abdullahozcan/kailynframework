<div class="@if($wrapper ?? true) mb-4 @endif">
    @if(isset($label) && $label)
        <label for="{{ $name }}" class="block text-sm font-medium text-gray-700 mb-1">{{ $label }}</label>
    @endif

    <div class="relative">
        @if(isset($icon))
            <div class="pointer-events-none absolute inset-y-0 {{ $position === 'right' ? 'right-0 pr-3' : 'left-0 pl-3' }} flex items-center">
                <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="{{ $icon }}"/>
                </svg>
            </div>
        @endif

        <input
            type="{{ $type ?? 'text' }}"
            name="{{ $name }}"
            id="{{ $name }}"
            value="{{ $value ?? '' }}"
            placeholder="{{ $placeholder ?? '' }}"
            {{ $required ?? false ? 'required' : '' }}
            {{ $disabled ?? false ? 'disabled' : '' }}
            @if(isset($kModel)) k-model="{{ $kModel }}" @endif
            @if(isset($kOn)) k-on:{{ $kOn }} @endif
            class="block w-full rounded-lg border px-3 py-2 text-sm shadow-sm transition-colors
                @if($icon && ($position ?? 'left') === 'left') pl-10 @endif
                @if($icon && ($position ?? 'left') === 'right') pr-10 @endif
                @if($error ?? false) border-red-400 focus:border-red-500 focus:ring-red-500/20
                @else border-gray-300 focus:border-indigo-500 focus:ring-indigo-500/20 @endif
                focus:outline-none focus:ring-4 disabled:bg-gray-100 disabled:cursor-not-allowed
                {{ $class ?? '' }}"
        >
    </div>

    @if($error ?? false)
        <p class="mt-1 text-sm text-red-500">{{ $error }}</p>
    @endif
</div>
