<div class="@if($wrapper ?? true) mb-4 @endif">
    @if(isset($label) && $label)
        <div class="flex items-center justify-between mb-1">
            <label for="{{ $name }}" class="text-sm font-medium text-gray-700">{{ $label }}</label>
            <span class="text-sm text-gray-500" id="{{ $name }}_val">{{ $value ?? $min ?? 0 }}</span>
        </div>
    @endif

    <input
        type="range"
        name="{{ $name }}"
        id="{{ $name }}"
        min="{{ $min ?? 0 }}"
        max="{{ $max ?? 100 }}"
